<!DOCTYPE html>
<html>
<head>
  <title>PhishGuard 🚀</title>
  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      margin-top: 100px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      width: 300px;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
      font-size: 16px;
    }

    button {
      padding: 12px 25px;
      border-radius: 10px;
      border: none;
      background: #00c6ff;
      color: black;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0072ff;
      color: white;
    }

    #result {
      margin-top: 30px;
      font-size: 20px;
      font-weight: bold;
    }

    .safe {
      color: #00ffcc;
    }

    .danger {
      color: #ff4d4d;
    }

    .loading {
      color: yellow;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
  </style>
</head>

<body>

  <h1>🚀 PhishGuard</h1>

  <input id="url" placeholder="Enter URL to scan..." />
  <br>
  <button onclick="scan()">Scan Now</button>

  <div id="result"></div>

  <script>
    async function scan() {
      const url = document.getElementById("url").value;
      const resultDiv = document.getElementById("result");

      resultDiv.className = "loading";
      resultDiv.innerText = "🔍 Scanning...";

      try {
        const res = await fetch("http://localhost:5001/check", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ url })
        });

        const data = await res.json();

        if (data.result.includes("Safe")) {
          resultDiv.className = "safe";
        } else {
          resultDiv.className = "danger";
        }

        resultDiv.innerText = data.result;

      } catch (err) {
        resultDiv.className = "danger";
        resultDiv.innerText = "❌ Backend Error";
      }
    }
  </script>

</body>
</html>
